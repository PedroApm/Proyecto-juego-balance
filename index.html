<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tug of War XR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>

  <!-- HUD 2D -->
  <div id="marcador">
    <div class="marcador-lado marcador-izq">
      <span class="marcador-label">LEFT</span>
      <span class="marcador-num" id="conteo-left">0</span>
    </div>
    <div class="marcador-centro">
      <div class="timer-row">
        <span id="timer-display" class="timer">-:--</span>
        <span id="hud-badge" class="hud-badge estado-esperando">0/3</span>
      </div>
      <div class="balance-row">
        <span id="desplazamiento-icono">&#x2696;</span>
        <span id="desplazamiento-val">0</span>
      </div>
    </div>
    <div class="marcador-lado marcador-der">
      <span class="marcador-num" id="conteo-right">0</span>
      <span class="marcador-label">RIGHT</span>
    </div>
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <span id="status-texto">Conectando...</span>
  </div>

  <!-- Pantalla de ingreso -->
  <div id="pantalla-ingreso">
    <div class="card-ingreso">
      <div class="card-glow"></div>
      <h1 class="titulo-juego">TUG OF WAR <span>XR</span></h1>
      <p class="subtitulo">Elige tu lado y desequilibra la cuerda</p>
      <div class="input-group">
        <input type="text" id="input-alias" placeholder="Tu alias..." maxlength="20" autocomplete="off" />
      </div>
      <button id="btn-entrar">
        <span>Entrar al campo</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
      <p id="error-msg" class="error-msg oculto"></p>
    </div>
  </div>

  <!-- Selector de lado -->
  <div id="selector-lado" class="oculto">
    <p id="bienvenida"></p>
    <div class="botones-lado">
      <button id="btn-left" class="btn-lado btn-left">
        <span class="btn-icono">&#9664;</span>
        <span class="btn-texto">LEFT</span>
        <span class="btn-sub" id="sub-left">0 jugadores</span>
      </button>
      <div class="vs-divider">VS</div>
      <button id="btn-right" class="btn-lado btn-right">
        <span class="btn-texto">RIGHT</span>
        <span class="btn-icono">&#9654;</span>
        <span class="btn-sub" id="sub-right">0 jugadores</span>
      </button>
    </div>
  </div>

  <!-- Overlay Ganador -->
  <div id="overlay-ganador" class="oculto">
    <div class="ganador-card">
      <div class="ganador-emoji" id="ganador-emoji">&#x1F3C6;</div>
      <h2 class="ganador-titulo" id="ganador-titulo">Fin!</h2>
      <p class="ganador-subtitulo" id="ganador-subtitulo"></p>
      <button id="btn-nueva-partida" class="btn-nueva">Nueva partida</button>
    </div>
  </div>

  <!-- ESCENA A-FRAME - LLANURA PLANA -->
  <a-scene
    id="escena-xr"
    fog="type: linear; color: #b8dba8; near: 12; far: 22"
    renderer="antialias: true; colorManagement: true"
    vr-mode-ui="enabled: true"
  >
    <a-assets>
      <audio id="audio-ambient" src="assets/sounds/ambient.mp3" preload="auto"></audio>
      <audio id="audio-tension" src="assets/sounds/tension.mp3" preload="auto"></audio>
    </a-assets>

    <a-entity id="sonido-left"  position="-4 1.5 -3"
      sound="src: #audio-ambient; autoplay: true; loop: true; volume: 0.3"></a-entity>
    <a-entity id="sonido-right" position=" 4 1.5 -3"
      sound="src: #audio-ambient; autoplay: true; loop: true; volume: 0.3"></a-entity>

    <a-sky color="#87ceeb"></a-sky>

    <a-plane position="0 0 -5" rotation="-90 0 0"
      width="50" height="40"
      color="#4a8c3f" roughness="0.95" metalness="0"></a-plane>

    <a-box position="0 0.01 -3" width="0.05" height="0.01" depth="10"
      color="#ffffff" opacity="0.2"></a-box>

    <a-sphere id="punto-equilibrio" position="0 1.5 -3"
      radius="0.2" color="#ffffff"
      emissive="#8888ff" emissive-intensity="0.7"
      animation="property: scale; from: 1 1 1; to: 1.2 1.2 1.2;
        dir: alternate; loop: true; dur: 1200; easing: easeInOutSine">
    </a-sphere>
    <a-light type="point" position="0 1.5 -3" color="#aaaaff" intensity="0.5" distance="3"></a-light>

    <a-cylinder id="cuerda" position="0 1.5 -3"
      radius="0.09" height="8" rotation="0 0 90"
      color="#d4a96a" roughness="0.7" metalness="0.1">
    </a-cylinder>

    <a-sphere id="extremo-left" position="-4 1.5 -3"
      radius="0.16" color="#4aaeff"
      emissive="#4aaeff" emissive-intensity="0.6"
      animation="property: scale; from: 1 1 1; to: 1.15 1.15 1.15;
        dir: alternate; loop: true; dur: 1500; easing: easeInOutSine">
    </a-sphere>
    <a-light type="point" position="-4 1.5 -3" color="#4aaeff" intensity="0.5" distance="2.5"></a-light>

    <a-sphere id="extremo-right" position="4 1.5 -3"
      radius="0.16" color="#ff8844"
      emissive="#ff8844" emissive-intensity="0.6"
      animation="property: scale; from: 1 1 1; to: 1.15 1.15 1.15;
        dir: alternate; loop: true; dur: 1800; easing: easeInOutSine">
    </a-sphere>
    <a-light type="point" position="4 1.5 -3" color="#ff8844" intensity="0.5" distance="2.5"></a-light>

    <a-text id="texto-left-3d"  value="LEFT"  position="-4 2.15 -3"
      align="center" color="#4aaeff" scale="1.4 1.4 1.4"></a-text>
    <a-text id="texto-right-3d" value="RIGHT" position=" 4 2.15 -3"
      align="center" color="#ff8844" scale="1.4 1.4 1.4"></a-text>

    <a-text id="marcador-left-3d"  value="LEFT&#10;0"  position="-6 3.4 -5"
      align="center" color="#4aaeff" scale="2 2 2" width="2"></a-text>
    <a-text id="marcador-right-3d" value="RIGHT&#10;0" position=" 6 3.4 -5"
      align="center" color="#ff8844" scale="2 2 2" width="2"></a-text>

    <a-cylinder position="0 0.75 -3" radius="0.05" height="1.5" color="#555"
      roughness="0.9"></a-cylinder>

    <a-entity id="jugadores-left"></a-entity>
    <a-entity id="jugadores-right"></a-entity>

    <a-entity position="0 1.6 0">
      <a-camera look-controls wasd-controls fov="80">
        <a-cursor color="#ffffff" opacity="0.6"></a-cursor>
      </a-camera>
    </a-entity>

    <a-light type="ambient"     color="#aaccaa" intensity="0.8"></a-light>
    <a-light type="directional" position="3 8 3"   intensity="1.0" color="#fffde8"></a-light>
    <a-light type="directional" position="-3 5 -5" intensity="0.3" color="#c8e8ff"></a-light>

  </a-scene>

  <!-- Logica principal -->
  <script type="module">
    import {
      registrarJugador, cambiarLado, obtenerJugadores,
      calcularDesplazamiento, calcularEstadoPartida,
      suscribirCambios, reiniciarJuego, getJugadorId
    } from './js/game.js'

    import { actualizarCuerda, actualizarJugadoresVisuales } from './js/scene.js'

    const pantallaIngreso  = document.getElementById('pantalla-ingreso')
    const selectorLado     = document.getElementById('selector-lado')
    const inputAlias       = document.getElementById('input-alias')
    const btnEntrar        = document.getElementById('btn-entrar')
    const btnLeft          = document.getElementById('btn-left')
    const btnRight         = document.getElementById('btn-right')
    const conteoLeftEl     = document.getElementById('conteo-left')
    const conteoRightEl    = document.getElementById('conteo-right')
    const desplVal         = document.getElementById('desplazamiento-val')
    const desplIcono       = document.getElementById('desplazamiento-icono')
    const bienvenida       = document.getElementById('bienvenida')
    const subLeft          = document.getElementById('sub-left')
    const subRight         = document.getElementById('sub-right')
    const timerEl          = document.getElementById('timer-display')
    const hudBadge         = document.getElementById('hud-badge')
    const statusEl         = document.getElementById('status-texto')
    const overlayGanador   = document.getElementById('overlay-ganador')
    const ganadorTitulo    = document.getElementById('ganador-titulo')
    const ganadorSubtitulo = document.getElementById('ganador-subtitulo')
    const ganadorEmoji     = document.getElementById('ganador-emoji')
    const btnNuevaPartida  = document.getElementById('btn-nueva-partida')

    let miRegistrado  = false
    let gameEstado    = 'esperando'
    let gameStartMs   = null
    let timerInterval = null

    function formatTimer(seg) {
      const m = Math.floor(seg / 60)
      const s = seg % 60
      return `${m}:${String(s).padStart(2, '0')}`
    }

    function tickTimer() {
      if (!gameStartMs) return
      const remaining = Math.ceil((90000 - (Date.now() - gameStartMs)) / 1000)
      if (remaining <= 0) {
        clearInterval(timerInterval)
        timerInterval = null
        timerEl.textContent = '0:00'
        timerEl.classList.remove('urgente')
        actualizarTodo()
        return
      }
      timerEl.textContent = formatTimer(remaining)
      timerEl.classList.toggle('urgente', remaining <= 10)
    }

    function mostrarGanador(ganador) {
      overlayGanador.classList.remove('oculto')
      if (ganador === 'EMPATE') {
        ganadorEmoji.textContent     = '🤝'
        ganadorTitulo.textContent    = 'Empate!'
        ganadorSubtitulo.textContent = 'Ambos lados tienen los mismos jugadores'
      } else {
        ganadorEmoji.textContent     = ganador === 'LEFT' ? '◄🏆' : '🏆►'
        ganadorTitulo.textContent    = `Gana ${ganador}!`
        ganadorSubtitulo.textContent = `El lado ${ganador} domina la cuerda`
        ganadorTitulo.style.color    = ganador === 'LEFT' ? '#4aaeff' : '#ff8844'
      }
    }

    function resetUI() {
      miRegistrado = false
      gameEstado   = 'esperando'
      gameStartMs  = null
      clearInterval(timerInterval)
      timerInterval = null
      timerEl.textContent = '-:--'
      timerEl.classList.remove('urgente')
      overlayGanador.classList.add('oculto')
      selectorLado.classList.add('oculto')
      pantallaIngreso.classList.remove('oculto', 'salida')
      btnEntrar.disabled = false
      btnEntrar.querySelector('span').textContent = 'Entrar al campo'
      inputAlias.value = ''
    }

    async function actualizarTodo() {
      try {
        const { izquierda, derecha, total, todos } = await obtenerJugadores()
        const d = calcularDesplazamiento(izquierda.length, derecha.length)

        conteoLeftEl.textContent   = izquierda.length
        conteoRightEl.textContent  = derecha.length
        desplVal.textContent       = `${d > 0 ? '+' : ''}${d}px`
        desplVal.className         = d === 0 ? '' : d > 0 ? 'dom-left' : 'dom-right'
        desplIcono.style.transform = `rotate(${d / 3}deg)`

        subLeft.textContent  = `${izquierda.length} jugador${izquierda.length !== 1 ? 'es' : ''}`
        subRight.textContent = `${derecha.length} jugador${derecha.length !== 1 ? 'es' : ''}`

        actualizarCuerda(d)
        actualizarJugadoresVisuales(izquierda, derecha)

        if (total === 0 && miRegistrado) { resetUI(); return }

        const ep = calcularEstadoPartida(todos)

        if (ep.estado === 'esperando') {
          gameEstado = 'esperando'
          clearInterval(timerInterval); timerInterval = null
          timerEl.textContent = '-:--'
          hudBadge.textContent = `${total}/3`
          hudBadge.className = 'hud-badge estado-esperando'
          const faltan = 3 - total
          statusEl.textContent = total === 0
            ? 'Se el primero en unirte'
            : `Esperando ${faltan} jugador${faltan !== 1 ? 'es' : ''} mas para comenzar`

        } else if (ep.estado === 'jugando') {
          hudBadge.textContent = 'EN VIVO'
          hudBadge.className = 'hud-badge estado-jugando'
          if (gameEstado !== 'jugando') {
            gameEstado  = 'jugando'
            gameStartMs = ep.inicioMs
            clearInterval(timerInterval)
            timerInterval = setInterval(tickTimer, 1000)
            statusEl.textContent = 'La partida ha comenzado!'
            setTimeout(() => {
              if (gameEstado === 'jugando') statusEl.textContent = 'Elige tu lado para ganar'
            }, 3000)
          }
          timerEl.textContent = formatTimer(ep.tiempoRestante)

        } else if (ep.estado === 'terminado') {
          hudBadge.textContent = 'FIN'
          hudBadge.className = 'hud-badge estado-terminado'
          if (gameEstado !== 'terminado') {
            gameEstado = 'terminado'
            clearInterval(timerInterval); timerInterval = null
            timerEl.textContent = '0:00'
            timerEl.classList.remove('urgente')
            statusEl.textContent = 'Fin de la partida!'
            mostrarGanador(ep.ganador)
          }
        }

      } catch (e) {
        console.error('Error actualizando estado:', e)
      }
    }

    btnEntrar.addEventListener('click', async () => {
      const alias = inputAlias.value.trim()
      if (!alias) {
        inputAlias.classList.add('shake')
        setTimeout(() => inputAlias.classList.remove('shake'), 400)
        return
      }
      btnEntrar.disabled = true
      btnEntrar.querySelector('span').textContent = 'Entrando...'

      // Transicion visual inmediata — no esperar la red
      pantallaIngreso.classList.add('salida')
      setTimeout(() => pantallaIngreso.classList.add('oculto'), 400)
      selectorLado.classList.remove('oculto')
      selectorLado.classList.add('entrada')
      bienvenida.textContent = `Hola, ${alias}`
      btnLeft.classList.add('activo')
      btnLeft.disabled = true
      btnRight.disabled = true

      try {
        await registrarJugador(alias, 'LEFT')
        miRegistrado = true
        btnLeft.disabled = false
        btnRight.disabled = false
        await actualizarTodo()
      } catch (e) {
        console.error(e)
        // Revertir si falla
        pantallaIngreso.classList.remove('oculto', 'salida')
        selectorLado.classList.add('oculto')
        btnEntrar.disabled = false
        btnEntrar.querySelector('span').textContent = 'Entrar al campo'
        btnLeft.disabled = false
        btnRight.disabled = false
        const errMsg = document.getElementById('error-msg')
        errMsg.textContent = e?.message || 'Error al conectar con Supabase'
        errMsg.classList.remove('oculto')
        setTimeout(() => errMsg.classList.add('oculto'), 6000)
      }
    })

    inputAlias.addEventListener('keydown', e => { if (e.key === 'Enter') btnEntrar.click() })

    async function elegirLado(lado) {
      if (gameEstado === 'terminado') return
      try {
        await cambiarLado(lado)
        btnLeft.classList.toggle('activo',  lado === 'LEFT')
        btnRight.classList.toggle('activo', lado === 'RIGHT')
        await actualizarTodo()
      } catch (e) {
        console.error('Error cambiando lado:', e)
      }
    }

    btnLeft.addEventListener('click',  () => elegirLado('LEFT'))
    btnRight.addEventListener('click', () => elegirLado('RIGHT'))

    btnNuevaPartida.addEventListener('click', async () => {
      btnNuevaPartida.disabled = true
      btnNuevaPartida.textContent = 'Reiniciando...'
      try {
        await reiniciarJuego()
        resetUI()
      } catch (e) {
        console.error(e)
        btnNuevaPartida.disabled = false
        btnNuevaPartida.textContent = 'Nueva partida'
      }
    })

    suscribirCambios(actualizarTodo)
    actualizarTodo()

    // ── Generacion de arboles y colinas ──
    function crearArbol(x, z, escala = 1) {
      const g = document.createElement('a-entity')
      g.setAttribute('position', `${x} 0 ${z}`)
      g.setAttribute('scale', `${escala} ${escala} ${escala}`)

      const tronco = document.createElement('a-cylinder')
      tronco.setAttribute('position', '0 0.75 0')
      tronco.setAttribute('radius', '0.09')
      tronco.setAttribute('height', '1.5')
      tronco.setAttribute('color', '#6b3a2a')
      tronco.setAttribute('roughness', '0.9')
      g.appendChild(tronco)

      // Tres capas de follaje para aspecto mas voluminoso
      const capas = [
        { y: 2.1,  rb: 0.95, h: 2.0, c: '#1e5e1e' },
        { y: 3.0,  rb: 0.72, h: 1.7, c: '#2a7a2a' },
        { y: 3.75, rb: 0.48, h: 1.4, c: '#338033' },
      ]
      capas.forEach(({ y, rb, h, c }) => {
        const cono = document.createElement('a-cone')
        cono.setAttribute('position', `0 ${y} 0`)
        cono.setAttribute('radius-bottom', rb)
        cono.setAttribute('radius-top', '0.04')
        cono.setAttribute('height', h)
        cono.setAttribute('color', c)
        cono.setAttribute('roughness', '0.85')
        g.appendChild(cono)
      })

      return g
    }

    function crearColina(x, y, z, radio, color) {
      const s = document.createElement('a-sphere')
      s.setAttribute('position', `${x} ${y} ${z}`)
      s.setAttribute('radius', radio)
      s.setAttribute('color', color)
      s.setAttribute('roughness', '1')
      s.setAttribute('segments-height', '7')
      s.setAttribute('segments-width', '10')
      return s
    }

    function poblarEscena() {
      const scene = document.getElementById('escena-xr')

      // Arboles fondo — varias filas, centro libre
      const arboles = [
        // Fila cercana lateral izq/der (Z -2 a -6, X fuera del area de juego)
        [-7.5, -1.5, 0.85], [-9.5, -1.5, 1.0],
        [-8.5, -3.5, 0.95], [-10,  -3.0, 1.1],
        [-7.5, -5.5, 0.9],  [-9.5, -5.0, 1.0],
        [ 7.5, -1.5, 0.85], [ 9.5, -1.5, 1.0],
        [ 8.5, -3.5, 0.95], [10,   -3.0, 1.1],
        [ 7.5, -5.5, 0.9],  [ 9.5, -5.0, 1.0],

        // Primera fila fondo (Z -7 a -9)
        [-10,  -7.0, 1.1], [-7.5, -7.5, 1.0], [-5, -7.0, 0.9],
        [ -2,  -8.0, 1.05],[  0,  -7.5, 0.95],[  2, -8.0, 1.0],
        [  5,  -7.0, 0.9], [ 7.5, -7.5, 1.0], [10,  -7.0, 1.15],

        // Segunda fila fondo (Z -10 a -12)
        [-11,  -10, 1.3], [-7.5, -10.5, 1.2], [-3.5, -11, 1.1],
        [  0,  -11.5, 1.25], [3.5, -11, 1.1], [7.5, -10.5, 1.2],
        [ 11,  -10, 1.35],

        // Tercera fila fondo (Z -13, casi en niebla)
        [-9, -13, 1.5], [-4, -13.5, 1.4], [0, -14, 1.6],
        [ 4, -13.5, 1.4], [9, -13, 1.5],
      ]

      arboles.forEach(([x, z, s]) => scene.appendChild(crearArbol(x, z, s)))

      // Colinas lejanas (semi-enterradas, crean horizonte)
      const colinas = [
        [-11, -5, -17, 8,  '#2a5a2a'],
        [  3, -6, -20, 11, '#234823'],
        [ 12, -4, -16, 7,  '#2d5e2d'],
        [ -3, -7, -22, 13, '#1e421e'],
        [ 10, -5, -19, 9,  '#265226'],
        [-14, -3, -15, 6,  '#2a5a2a'],
      ]

      colinas.forEach(([x, y, z, r, c]) => scene.appendChild(crearColina(x, y, z, r, c)))
    }

    const escena = document.getElementById('escena-xr')
    if (escena.hasLoaded) poblarEscena()
    else escena.addEventListener('loaded', poblarEscena)
  </script>
</body>
</html>
