
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyecto XR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Marcador -->
  <div id="marcador">
    <span id="conteo-left">LEFT: 0</span>
    <span id="desplazamiento">⚖ 0px</span>
    <span id="conteo-right">RIGHT: 0</span>
  </div>

  <!-- Pantalla de ingreso -->
  <div id="pantalla-ingreso">
    <div class="card-ingreso">
      <h1>Tug of War XR</h1>
      <input type="text" id="input-alias" placeholder="Tu alias..." maxlength="20" />
      <button id="btn-entrar">Entrar</button>
    </div>
  </div>

  <!-- Selector de lado -->
  <div id="selector-lado" class="oculto">
    <p id="bienvenida"></p>
    <div class="botones-lado">
      <button id="btn-left" class="btn-lado btn-left">◀ LEFT</button>
      <button id="btn-right" class="btn-lado btn-right">RIGHT ▶</button>
    </div>
  </div>


  <!-- ESCENA A-FRAME -->
  <a-scene
    id="escena-xr"
    background="color: #0a0a1a"
    renderer="antialias: true"
    vr-mode-ui="enabled: true"
  >

    <!-- Assets / audio -->
    <a-assets>
      <audio id="audio-ambient" src="assets/sounds/ambient.mp3"   preload="auto" loop></audio>
      <audio id="audio-tension" src="assets/sounds/tension.mp3"   preload="auto" loop></audio>
    </a-assets>

    <!-- Sonidos posicionados (usados por scene.js) -->
    <a-entity id="sonido-left"  position="-4 1.5 -4"
      sound="src: #audio-ambient; autoplay: true; loop: true; volume: 0.3"></a-entity>
    <a-entity id="sonido-right" position=" 4 1.5 -4"
      sound="src: #audio-ambient; autoplay: true; loop: true; volume: 0.3"></a-entity>

    <!-- Entorno -->
    <a-entity environment="preset: forest; groundColor: #1a1a2e; grid: none; fog: 0.6"></a-entity>

    <!-- Suelo propio para más control -->
    <a-plane
      position="0 0 -4"
      rotation="-90 0 0"
      width="30" height="20"
      color="#1a1a2e"
      roughness="1"
    ></a-plane>

    <!-- ── Punto de equilibrio central (FIJO) ── -->
    <a-sphere
      id="punto-equilibrio"
      position="0 1.5 -4"
      radius="0.18"
      color="#ffffff"
      emissive="#aaaaff"
      emissive-intensity="0.4"
    ></a-sphere>

    <!-- ── Cuerda / barra (se mueve con actualizarCuerda) ── -->
    <a-cylinder
      id="cuerda"
      position="0 1.5 -4"
      radius="0.06"
      height="5"
      rotation="0 0 90"
      color="#c8a96e"
      roughness="0.8"
    ></a-cylinder>

    <!-- Extremo izquierdo de la cuerda -->
    <a-sphere
      id="extremo-left"
      position="-2.5 1.5 -4"
      radius="0.12"
      color="#4aaeff"
      emissive="#4aaeff"
      emissive-intensity="0.5"
    ></a-sphere>

    <!-- Extremo derecho de la cuerda -->
    <a-sphere
      id="extremo-right"
      position="2.5 1.5 -4"
      radius="0.12"
      color="#ff8844"
      emissive="#ff8844"
      emissive-intensity="0.5"
    ></a-sphere>

    <!-- Indicadores LEFT / RIGHT en extremos -->
    <a-text
      id="texto-left-3d"
      value="LEFT"
      position="-2.5 2.1 -4"
      align="center"
      color="#4aaeff"
      scale="1.2 1.2 1.2"
    ></a-text>
    <a-text
      id="texto-right-3d"
      value="RIGHT"
      position="2.5 2.1 -4"
      align="center"
      color="#ff8844"
      scale="1.2 1.2 1.2"
    ></a-text>

    <!-- Marcador 3D (score) -->
    <a-text
      id="marcador-left-3d"
      value="LEFT&#10;0"
      position="-4 3.2 -5"
      align="center"
      color="#4aaeff"
      scale="1.6 1.6 1.6"
    ></a-text>
    <a-text
      id="marcador-right-3d"
      value="RIGHT&#10;0"
      position="4 3.2 -5"
      align="center"
      color="#ff8844"
      scale="1.6 1.6 1.6"
    ></a-text>

    <!-- Contenedor jugadores izquierda -->
    <a-entity id="jugadores-left"></a-entity>

    <!-- Contenedor jugadores derecha -->
    <a-entity id="jugadores-right"></a-entity>

    <!-- Poste central -->
    <a-cylinder
      position="0 0.75 -4"
      radius="0.05"
      height="1.5"
      color="#555"
    ></a-cylinder>

    <!-- Cámara con controles para desktop y VR -->
    <a-entity position="0 1.6 2">
      <a-camera look-controls wasd-controls>
        <a-cursor color="#ffffff" opacity="0.7"></a-cursor>
      </a-camera>
    </a-entity>

    <!-- Luz ambiental -->
    <a-light type="ambient" color="#334" intensity="0.8"></a-light>
    <a-light type="directional" position="2 4 1" intensity="0.9" color="#fff"></a-light>

  </a-scene>
  
  <script type="module">
    import {
      registrarJugador,
      cambiarLado,
      obtenerConteo,
      calcularDesplazamiento,
      suscribirCambios
    } from './js/game.js'

    const pantallaIngreso = document.getElementById('pantalla-ingreso')
    const selectorLado = document.getElementById('selector-lado')
    const inputAlias = document.getElementById('input-alias')
    const btnEntrar = document.getElementById('btn-entrar')
    const btnLeft = document.getElementById('btn-left')
    const btnRight = document.getElementById('btn-right')
    const conteoLeft = document.getElementById('conteo-left')
    const conteoRight = document.getElementById('conteo-right')
    const desplazamientoEl = document.getElementById('desplazamiento')
    const bienvenida = document.getElementById('bienvenida')

    async function actualizarMarcador() {
      const { izquierda, derecha } = await obtenerConteo()
      conteoLeft.textContent = `LEFT: ${izquierda}`
      conteoRight.textContent = `RIGHT: ${derecha}`
      const d = calcularDesplazamiento(izquierda, derecha)
      desplazamientoEl.textContent = `⚖ ${d > 0 ? '+' : ''}${d}px`
      desplazamientoEl.style.color = d === 0 ? '#fff' : d > 0 ? '#4af' : '#f84'
    }

    btnEntrar.addEventListener('click', async () => {
      const alias = inputAlias.value.trim()
      if (!alias) return

      btnEntrar.disabled = true
      btnEntrar.textContent = 'Entrando...'

      try {
        await registrarJugador(alias, 'LEFT')
        pantallaIngreso.classList.add('oculto')
        selectorLado.classList.remove('oculto')
        bienvenida.textContent = `Hola, ${alias}! Elige tu lado:`
        btnLeft.classList.add('activo')
        await actualizarMarcador()
      } catch (e) {
        console.error(e)
        btnEntrar.disabled = false
        btnEntrar.textContent = 'Entrar'
      }
    })

    inputAlias.addEventListener('keydown', e => {
      if (e.key === 'Enter') btnEntrar.click()
    })

    async function elegirLado(lado) {
      btnLeft.classList.toggle('activo', lado === 'LEFT')
      btnRight.classList.toggle('activo', lado === 'RIGHT')
      await cambiarLado(lado)
    }

    btnLeft.addEventListener('click', () => elegirLado('LEFT'))
    btnRight.addEventListener('click', () => elegirLado('RIGHT'))

    suscribirCambios(actualizarMarcador)
    actualizarMarcador()
  </script>
</body>
</html>
